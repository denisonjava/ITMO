apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
    app: redis
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - port: 6379
      name: redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:8.0.3-alpine
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: redis-data
          mountPath: /data
      volumes:
      - name: redis-data
        emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-app-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-app-api
  template:
    metadata:
      labels:
        app: chat-app-api
    spec:
      containers:
      - name: cha-app-api
        image: rayhimself/basic-redis-chat-app-api:latest
        ports:
        - containerPort: 8080
        env:
        - name: REDIS_ENDPOINT_URL
          value: "redis.default.svc.cluster.local:6379"
---
apiVersion: v1
kind: Service
metadata:
  name: chat-app-api
spec:
  type: LoadBalancer
  selector:
    app: chat-app-api
  ports:
    - port: 80
      targetPort: 8080


